<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#121212">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WOTR">
<title>WOTR — Old Time Radio</title>
<style>
  :root {
    --bg: #121212;
    --bg-panel: #181818;
    --bg-raised: #1f1f1f;
    --text: #F5F5F5;
    --text-dim: #8a8a8a;
    --phosphor: #00FF41;
    --phosphor-dim: #0a5c22;
    --phosphor-glow: rgba(0, 255, 65, 0.45);
    --border: #2a2a2a;
    --mono: "Courier New", ui-monospace, SFMono-Regular, Menlo, monospace;
    --sans: "Helvetica Neue", Arial, sans-serif;
  }
 
  * { margin: 0; padding: 0; box-sizing: border-box; }
 
  html, body {
    height: 100%;
    overscroll-behavior: none;            /* no pull-to-refresh killing the broadcast */
    -webkit-text-size-adjust: 100%;       /* stop iOS landscape font inflation */
  }
 
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }
 
  button { touch-action: manipulation; }  /* kill double-tap zoom delay on controls */
 
  .app {
    display: flex;
    height: 100vh;
    height: 100dvh;
  }
 
  /* ---------- SIDEBAR ---------- */
  .sidebar {
    width: 240px;
    min-width: 240px;
    background: var(--bg-panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 28px 0;
  }
 
  .brand {
    padding: 0 24px 24px;
    border-bottom: 1px solid var(--border);
  }
 
  .brand h1 {
    font-family: var(--mono);
    font-size: 22px;
    letter-spacing: 4px;
    color: var(--text);
    font-weight: 700;
  }
 
  .brand .freq {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--text-dim);
    margin-top: 4px;
  }
 
  .station-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--text-dim);
    padding: 24px 24px 10px;
  }
 
  /* Mobile-only dropdown trigger — hidden on desktop, where the list is always shown */
  .station-trigger { display: none; }
 
  .stations {
    list-style: none;
    flex: 1;
    overflow-y: auto;
  }
 
  .stations button {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    background: none;
    border: none;
    border-left: 3px solid transparent;
    color: var(--text-dim);
    font-family: var(--sans);
    font-size: 15px;
    text-align: left;
    padding: 13px 24px;
    cursor: pointer;
    transition: color 0.2s, background 0.2s, border-color 0.2s;
  }
 
  .stations button:hover {
    color: var(--text);
    background: var(--bg-raised);
  }
 
  .stations button:focus-visible {
    outline: 2px solid var(--phosphor);
    outline-offset: -2px;
  }
 
  .stations button .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
    transition: background 0.2s, box-shadow 0.2s;
  }
 
  .stations li.active button {
    color: var(--text);
    font-weight: 700;
    background: var(--bg-raised);
    border-left-color: var(--phosphor);
  }
 
  .stations li.active button .dot {
    background: var(--phosphor);
    box-shadow: 0 0 8px var(--phosphor-glow);
  }
 
  /* ---------- MAIN ---------- */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px;
    position: relative;
    background:
      radial-gradient(ellipse 80% 60% at 50% 40%, rgba(0,255,65,0.025), transparent 70%),
      var(--bg);
  }
 
  /* faint scanlines over the display, like a lit dial glass */
  .display {
    width: 100%;
    max-width: 640px;
    text-align: center;
    position: relative;
    padding: 48px 32px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 3px),
      var(--bg-panel);
    transition: opacity 0.6s;
  }
 
  .display .eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--text-dim);
    margin-bottom: 18px;
    min-height: 14px;
  }
 
  .display .title {
    font-family: var(--mono);
    font-size: clamp(18px, 3vw, 26px);
    line-height: 1.45;
    color: var(--phosphor);
    text-shadow: 0 0 12px var(--phosphor-glow);
    word-wrap: break-word;
    min-height: 38px;
    transition: color 0.5s, text-shadow 0.5s;
  }
 
  .display .subtitle {
    font-family: var(--sans);
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 12px;
    min-height: 16px;
  }
 
  .display .timer {
    font-family: var(--mono);
    font-size: clamp(28px, 5vw, 42px);
    letter-spacing: 3px;
    color: var(--phosphor);
    text-shadow: 0 0 14px var(--phosphor-glow);
    margin-top: 30px;
    font-variant-numeric: tabular-nums;
    transition: color 0.5s, text-shadow 0.5s;
  }
 
  .display .timer-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--text-dim);
    margin-top: 6px;
  }
 
  /* powered-off dimming */
  .app.off .display .title,
  .app.off .display .timer {
    color: var(--phosphor-dim);
    text-shadow: none;
  }
 
  /* tuning flicker */
  @keyframes flicker {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.55; }
  }
  .display.tuning .title {
    animation: flicker 1.1s ease-in-out infinite;
  }
  @media (prefers-reduced-motion: reduce) {
    .display.tuning .title { animation: none; opacity: 0.7; }
  }
 
  /* ---------- POWER ---------- */
  .power-row {
    margin-top: 40px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
 
  .power-btn {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--bg-raised);
    color: var(--text-dim);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.3s, color 0.3s, box-shadow 0.3s;
  }
 
  .power-btn:focus-visible {
    outline: 2px solid var(--phosphor);
    outline-offset: 3px;
  }
 
  .power-btn svg {
    width: 26px;
    height: 26px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2.2;
    stroke-linecap: round;
  }
 
  .app.on .power-btn {
    border-color: var(--phosphor);
    color: var(--phosphor);
    box-shadow: 0 0 18px var(--phosphor-glow), inset 0 0 10px rgba(0,255,65,0.12);
  }
 
  .power-label {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--text-dim);
  }
 
  /* ---------- SLEEP TIMER ---------- */
  .sleep {
    margin-top: 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
 
  .sleep-head {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--text-dim);
  }
 
  .sleep-opts {
    display: flex;
    gap: 10px;
  }
 
  .sleep-btn {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 1px;
    color: var(--text-dim);
    background: var(--bg-raised);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 9px 14px;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s, background 0.2s, box-shadow 0.2s;
    touch-action: manipulation;
  }
 
  .sleep-btn:hover {
    color: var(--text);
    border-color: var(--text-dim);
  }
 
  .sleep-btn:focus-visible {
    outline: 2px solid var(--phosphor);
    outline-offset: 2px;
  }
 
  .sleep-btn.active {
    color: var(--phosphor);
    border-color: var(--phosphor);
    background: rgba(0, 255, 65, 0.08);
    box-shadow: 0 0 10px var(--phosphor-glow);
  }
 
  .sleep-countdown {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--phosphor);
    text-shadow: 0 0 8px var(--phosphor-glow);
    font-variant-numeric: tabular-nums;
  }
 
  /* ---------- RECENTLY PLAYED ---------- */
  .recent {
    margin-top: 36px;
    width: 100%;
    max-width: 640px;
  }
 
  .recent-head {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--text-dim);
    text-align: center;
    margin-bottom: 14px;
  }
 
  .recent-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
 
  .recent-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 12px 16px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 5px;
  }
 
  .recent-title {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
 
  .recent-link {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 1px;
    color: var(--phosphor);
    text-decoration: none;
    white-space: nowrap;
    flex-shrink: 0;
    padding: 4px 8px;
    border: 1px solid var(--phosphor-dim);
    border-radius: 4px;
    transition: background 0.2s, box-shadow 0.2s;
  }
 
  .recent-link:hover,
  .recent-link:focus-visible {
    background: rgba(0, 255, 65, 0.08);
    box-shadow: 0 0 10px var(--phosphor-glow);
    outline: none;
  }
 
  /* ---------- MOBILE ---------- */
  @media (max-width: 720px) {
    .app { flex-direction: column; }
    .sidebar {
      width: 100%;
      min-width: 0;
      border-right: none;
      border-bottom: 1px solid var(--border);
      padding: calc(12px + env(safe-area-inset-top)) 0 0;
      position: relative;            /* anchor for the absolute dropdown */
      z-index: 60;
    }
    .brand {
      padding: 0 calc(16px + env(safe-area-inset-left)) 12px;
      display: flex;
      align-items: baseline;
      gap: 10px;
      border-bottom: none;
    }
    .brand h1 { font-size: 18px; }
    .brand .freq { margin-top: 0; font-size: 10px; }
    .station-label { display: none; }
 
    /* The tappable trigger bar */
    .station-trigger {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      background: var(--bg-raised);
      border: none;
      border-top: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 15px;
      letter-spacing: 1px;
      text-align: left;
      padding: 15px calc(16px + env(safe-area-inset-right))
               15px calc(20px + env(safe-area-inset-left));
      cursor: pointer;
      touch-action: manipulation;
      min-height: 52px;
    }
    .station-trigger:focus-visible {
      outline: 2px solid var(--phosphor);
      outline-offset: -2px;
    }
    .station-trigger-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--phosphor);
      box-shadow: 0 0 8px var(--phosphor-glow);
      flex-shrink: 0;
    }
    .station-trigger-label { flex: 1; }
    .station-trigger-chevron {
      width: 20px;
      height: 20px;
      stroke: var(--text-dim);
      fill: none;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
      transition: transform 0.25s ease;
    }
    .sidebar.open .station-trigger-chevron { transform: rotate(180deg); }
 
    /* The dropdown panel — hidden until the sidebar is .open */
    .stations {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      flex-direction: column;
      background: var(--bg-panel);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 16px 28px rgba(0, 0, 0, 0.55);
      max-height: 70vh;
      overflow-y: auto;
      z-index: 60;
    }
    .sidebar.open .stations { display: flex; }
    .stations button {
      width: 100%;
      border-left: none;
      border-bottom: 1px solid var(--border);
      padding: 0 calc(20px + env(safe-area-inset-left));
      min-height: 54px;              /* comfortable thumb target */
      font-size: 15px;
    }
    .stations li:last-child button { border-bottom: none; }
    .stations li.active button {
      border-left: none;
      background: var(--bg-raised);
      color: var(--text);
      font-weight: 700;
    }
    .main {
      padding: 20px calc(16px + env(safe-area-inset-right))
               calc(20px + env(safe-area-inset-bottom))
               calc(16px + env(safe-area-inset-left));
      justify-content: space-evenly;      /* display + power share the column nicely */
    }
    .display { padding: 28px 18px; }
    .display .timer { margin-top: 22px; }
    .power-row { margin-top: 0; flex-direction: column; gap: 10px; }
    .power-btn { width: 76px; height: 76px; }  /* primary control = biggest target */
    .sleep { margin-top: 20px; }
    .recent { margin-top: 24px; }
    .recent-title { font-size: 12px; max-width: 55vw; }
  }
 
  /* Phone in landscape: keep everything on one screen, no scrolling */
  @media (max-width: 920px) and (max-height: 450px) {
    .sidebar { padding-top: 8px; }
    .brand { padding-bottom: 6px; }
    .main {
      flex-direction: row;
      gap: 24px;
      justify-content: center;
      padding: 12px 16px;
    }
    .display { padding: 20px 18px; }
    .display .timer { font-size: 26px; margin-top: 14px; }
    .power-row { margin-top: 0; flex-direction: column; }
  }
</style>
</head>
<body>
<div class="app off" id="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <h1>WOTR</h1>
      <div class="freq">OLD TIME RADIO &middot; AM 1937</div>
    </div>
    <button class="station-trigger" type="button" id="stationTrigger"
            aria-haspopup="true" aria-expanded="false" aria-controls="stationList">
      <span class="station-trigger-dot" id="stationTriggerDot" style="opacity:0.25"></span>
      <span class="station-trigger-label" id="stationTriggerLabel">SELECT STATION</span>
      <svg class="station-trigger-chevron" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M6 9l6 6 6-6"/>
      </svg>
    </button>
    <div class="station-label">STATIONS</div>
    <ul class="stations" id="stationList"></ul>
  </aside>
 
  <main class="main">
    <div class="display" id="display">
      <div class="eyebrow" id="eyebrow">STANDBY</div>
      <div class="title" id="trackTitle">Select a station to tune in.</div>
      <div class="subtitle" id="trackSub"></div>
      <div class="timer" id="timer">--:--</div>
      <div class="timer-label">TIME REMAINING</div>
    </div>
 
    <div class="power-row">
      <button class="power-btn" id="powerBtn" aria-label="Power" aria-pressed="false">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 3v8"/>
          <path d="M6.3 6.3a8 8 0 1 0 11.4 0"/>
        </svg>
      </button>
      <div class="power-label" id="powerLabel">POWER OFF</div>
    </div>
 
    <div class="sleep" id="sleep">
      <div class="sleep-head">SLEEP TIMER</div>
      <div class="sleep-opts" id="sleepOpts">
        <button class="sleep-btn" type="button" data-min="30">30 min</button>
        <button class="sleep-btn" type="button" data-min="60">60 min</button>
        <button class="sleep-btn" type="button" data-min="90">90 min</button>
      </div>
      <div class="sleep-countdown" id="sleepCountdown" hidden></div>
    </div>
 
    <section class="recent" id="recent" hidden aria-label="Recently played">
      <div class="recent-head">RECENTLY PLAYED</div>
      <div class="recent-list" id="recentList"></div>
    </section>
  </main>
</div>
 
<audio id="player" preload="auto" crossorigin="anonymous" playsinline style="display:none"></audio>
 
<script>
(function () {
  "use strict";
 
  // ---------- Station definitions ----------
  // Stations with `tag` hit the Advanced Search API. The Music station instead
  // draws from a hand-picked `musicIdentifiers` list (curated:true) and skips
  // the search step entirely — see getIdentifiers().
  const STATIONS = [
    { id: "comedy",    name: "Comedy",          tag: "subject:(comedy OR sitcom)" },
    { id: "mystery",   name: "Mystery / Horror", tag: "subject:(mystery OR horror OR suspense OR thriller)" },
    { id: "detective", name: "Detective / Crime", tag: "subject:(detective OR crime OR police OR noir)" },
    { id: "western",   name: "Westerns",         tag: "subject:(western OR frontier)" },
    { id: "variety",   name: "Variety",          tag: null },
    { id: "music",     name: "Music",            tag: null, curated: true }
  ];
 
  // Curated Archive.org identifiers for the Music station.
  const musicIdentifiers = [
    'general-electric-show-52-54-1952-12-25-12-guest-gary-crosby',
    'YourHitParade_OTR_3419',
    'SongsBySinatra451017FirstSongWhatMakesTheSunSet'
  ];
 
  // ---------- State ----------
  let activeStation = null;     // station object
  let isPoweredOn = false;
  let isLoading = false;
  let currentTrackInfo = null;  // { title, itemTitle, identifier, url }
  let session = 0;              // incremented to invalidate in-flight fetches
  const idCache = {};           // stationId -> array of identifiers
  const recentlyPlayed = [];    // last 2 finished shows, most-recent first
  let sleepMinutes = 0;         // 0 = off; otherwise 30/60/90
  let sleepDeadline = null;     // wall-clock ms timestamp the radio shuts off at
  let sleepInterval = null;
 
  // ---------- DOM ----------
  const appEl = document.getElementById("app");
  const listEl = document.getElementById("stationList");
  const sidebarEl = document.getElementById("sidebar");
  const stationTrigger = document.getElementById("stationTrigger");
  const stationTriggerLabel = document.getElementById("stationTriggerLabel");
  const stationTriggerDot = document.getElementById("stationTriggerDot");
  const displayEl = document.getElementById("display");
  const eyebrowEl = document.getElementById("eyebrow");
  const titleEl = document.getElementById("trackTitle");
  const subEl = document.getElementById("trackSub");
  const timerEl = document.getElementById("timer");
  const powerBtn = document.getElementById("powerBtn");
  const powerLabel = document.getElementById("powerLabel");
  const recentEl = document.getElementById("recent");
  const recentListEl = document.getElementById("recentList");
  const sleepOptsEl = document.getElementById("sleepOpts");
  const sleepCountdownEl = document.getElementById("sleepCountdown");
  const audio = document.getElementById("player");
 
  // ---------- Build station list ----------
  STATIONS.forEach(function (st) {
    const li = document.createElement("li");
    li.dataset.id = st.id;
    const btn = document.createElement("button");
    const dot = document.createElement("span");
    dot.className = "dot";
    btn.appendChild(dot);
    btn.appendChild(document.createTextNode(st.name));
    btn.addEventListener("click", function () { selectStation(st); });
    li.appendChild(btn);
    listEl.appendChild(li);
  });
 
  function markActiveStation() {
    Array.prototype.forEach.call(listEl.children, function (li) {
      const isActive = !!activeStation && li.dataset.id === activeStation.id;
      li.classList.toggle("active", isActive);
    });
    // Keep the mobile dropdown trigger in sync with the live station.
    stationTriggerLabel.textContent = activeStation ? activeStation.name : "SELECT STATION";
    stationTriggerDot.style.opacity = activeStation ? "1" : "0.25";
  }
 
  // ---------- Mobile station dropdown ----------
  function setStationMenu(open) {
    sidebarEl.classList.toggle("open", open);
    stationTrigger.setAttribute("aria-expanded", String(open));
  }
 
  stationTrigger.addEventListener("click", function (e) {
    e.stopPropagation();
    setStationMenu(!sidebarEl.classList.contains("open"));
  });
 
  // Tap anywhere outside the menu closes it
  document.addEventListener("click", function (e) {
    if (sidebarEl.classList.contains("open") && !sidebarEl.contains(e.target)) {
      setStationMenu(false);
    }
  });
 
  // Escape closes it too
  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape") setStationMenu(false);
  });
 
  // ---------- Recently played log (last 2 shows) ----------
  function pushHistory(track) {
    if (!track || !track.url) return;
    // Avoid logging the same show twice in a row (e.g. a station replaying it).
    if (recentlyPlayed.length && recentlyPlayed[0].url === track.url) return;
    recentlyPlayed.unshift(track);
    while (recentlyPlayed.length > 2) recentlyPlayed.pop();
    renderHistory();
  }
 
  function renderHistory() {
    if (!recentlyPlayed.length) {
      recentEl.hidden = true;
      recentListEl.textContent = "";
      return;
    }
    recentEl.hidden = false;
    recentListEl.textContent = "";
    recentlyPlayed.forEach(function (track) {
      const row = document.createElement("div");
      row.className = "recent-row";
 
      const name = document.createElement("span");
      name.className = "recent-title";
      name.textContent = track.title;
      name.title = track.title;
 
      const link = document.createElement("a");
      link.className = "recent-link";
      link.href = track.url;
      link.target = "_blank";
      link.rel = "noopener noreferrer";
      link.textContent = "Listen Here \u2197";
 
      row.appendChild(name);
      row.appendChild(link);
      recentListEl.appendChild(row);
    });
  }
 
  // ---------- Sleep timer ----------
  // Uses a wall-clock deadline rather than a decrementing counter, so mobile
  // background-throttling can't make the timer drift — when setInterval next
  // fires, the clock check is still accurate.
  Array.prototype.forEach.call(sleepOptsEl.querySelectorAll(".sleep-btn"), function (btn) {
    btn.addEventListener("click", function () {
      setSleep(parseInt(btn.dataset.min, 10));
    });
  });
 
  function setSleep(minutes) {
    if (sleepMinutes === minutes) { clearSleep(); return; } // tapping active = cancel
    sleepMinutes = minutes;
    sleepDeadline = Date.now() + minutes * 60000;
    if (sleepInterval) clearInterval(sleepInterval);
    sleepInterval = setInterval(tickSleep, 1000);
    renderSleep();
  }
 
  function clearSleep() {
    sleepMinutes = 0;
    sleepDeadline = null;
    if (sleepInterval) { clearInterval(sleepInterval); sleepInterval = null; }
    renderSleep();
  }
 
  function tickSleep() {
    if (!sleepDeadline) return;
    const remainingMs = sleepDeadline - Date.now();
    if (remainingMs <= 0) {
      // Fire: shut the set off. powerOff() calls clearSleep() so this won't loop.
      if (isPoweredOn) powerOff();
      else clearSleep();
      return;
    }
    sleepCountdownEl.textContent = "SLEEPS IN " + formatTime(remainingMs / 1000);
  }
 
  function renderSleep() {
    Array.prototype.forEach.call(sleepOptsEl.querySelectorAll(".sleep-btn"), function (btn) {
      btn.classList.toggle("active", parseInt(btn.dataset.min, 10) === sleepMinutes);
    });
    if (sleepMinutes && sleepDeadline) {
      sleepCountdownEl.hidden = false;
      tickSleep();
    } else {
      sleepCountdownEl.hidden = true;
      sleepCountdownEl.textContent = "";
    }
  }
 
  // ---------- Web Audio: compressor as auto gain control ----------
  let audioCtx = null;
  let webAudioOk = false;
 
  // iOS suspends/interrupts AudioContext when the screen locks or Safari is
  // backgrounded. Audio routed through Web Audio then goes SILENT even though
  // the <audio> element reports it is playing. A pocket radio that dies when
  // the screen locks is useless, so on iOS we skip the compressor entirely:
  // lock-screen playback beats volume normalization.
  const IS_IOS = /iP(hone|ad|od)/.test(navigator.userAgent) ||
    (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
 
  function initWebAudio() {
    if (audioCtx || IS_IOS) return;
    try {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      audioCtx = new Ctx();
      const source = audioCtx.createMediaElementSource(audio);
      const compressor = audioCtx.createDynamicsCompressor();
      compressor.threshold.value = -28;
      compressor.knee.value = 30;
      compressor.ratio.value = 10;
      compressor.attack.value = 0.005;
      compressor.release.value = 0.3;
      const makeup = audioCtx.createGain();
      makeup.gain.value = 1.4;
      source.connect(compressor);
      compressor.connect(makeup);
      makeup.connect(audioCtx.destination);
      webAudioOk = true;
      // Some browsers suspend the context on backgrounding; wake it back up.
      audioCtx.onstatechange = function () {
        if (audioCtx.state === "suspended" && isPoweredOn && !audio.paused) {
          audioCtx.resume().catch(function () {});
        }
      };
    } catch (e) {
      // Fall back to direct playback; audio element still routes to speakers
      webAudioOk = false;
    }
  }
 
  function resumeAudioCtx() {
    if (audioCtx && audioCtx.state === "suspended") {
      audioCtx.resume().catch(function () {});
    }
  }
 
  // Returning to the tab after backgrounding: make sure the context is alive
  // and the timer display catches up.
  document.addEventListener("visibilitychange", function () {
    if (document.visibilityState === "visible" && isPoweredOn) {
      resumeAudioCtx();
    }
  });
 
  // ---------- Fetch helpers ----------
  function fetchJsonWithTimeout(url, ms) {
    const ctrl = new AbortController();
    const t = setTimeout(function () { ctrl.abort(); }, ms);
    return fetch(url, { signal: ctrl.signal })
      .then(function (r) {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      })
      .finally(function () { clearTimeout(t); });
  }
 
  function buildSearchUrl(station, page) {
    let q = "collection:(oldtimeradio)";
    if (station.tag) q += " AND " + station.tag;
    return "https://archive.org/advancedsearch.php?q=" + encodeURIComponent(q) +
      "&fl[]=identifier&output=json&rows=100&page=" + page;
  }
 
  function getIdentifiers(station) {
    // Music station: skip the Advanced Search API entirely and serve the
    // hand-picked list straight into Step 2.
    if (station.curated) {
      const ids = (musicIdentifiers || []).filter(Boolean);
      if (!ids.length) return Promise.reject(new Error("No curated identifiers"));
      return Promise.resolve(ids);
    }
 
    const cached = idCache[station.id];
    if (cached && cached.length) return Promise.resolve(cached);
    // Random page adds variety between sessions; fall back to page 1 if empty.
    const page = 1 + Math.floor(Math.random() * 8);
    return fetchJsonWithTimeout(buildSearchUrl(station, page), 10000)
      .then(function (data) {
        const docs = (data.response && data.response.docs) || [];
        if (docs.length) return docs;
        return fetchJsonWithTimeout(buildSearchUrl(station, 1), 10000)
          .then(function (d2) { return (d2.response && d2.response.docs) || []; });
      })
      .then(function (docs) {
        const ids = docs.map(function (d) { return d.identifier; }).filter(Boolean);
        if (!ids.length) throw new Error("No identifiers");
        idCache[station.id] = ids;
        return ids;
      });
  }
 
  function pickRandom(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }
 
  function cleanTitle(name) {
    let t = name.replace(/\.mp3$/i, "");
    t = t.replace(/[_]+/g, " ").replace(/\s{2,}/g, " ").trim();
    return t || name;
  }
 
  function encodePath(name) {
    return name.split("/").map(encodeURIComponent).join("/");
  }
 
  // ---------- Core: tune in / next track ----------
  function tuneIn() {
    if (!isPoweredOn || !activeStation) return;
    const mySession = ++session;
    isLoading = true;
    setTuningUI();
 
    attempt(0);
 
    function attempt(tries) {
      if (mySession !== session) return; // stale
      if (tries >= 6) {
        isLoading = false;
        displayEl.classList.remove("tuning");
        titleEl.textContent = "Signal lost. Check your connection and flip the power switch.";
        subEl.textContent = "";
        return;
      }
 
      getIdentifiers(activeStation)
        .then(function (ids) {
          if (mySession !== session) throw { stale: true };
          const identifier = pickRandom(ids);
          return fetchJsonWithTimeout("https://archive.org/metadata/" + identifier, 10000)
            .then(function (meta) { return { identifier: identifier, meta: meta }; });
        })
        .then(function (res) {
          if (mySession !== session) throw { stale: true };
          const files = (res.meta && res.meta.files) || [];
          const mp3s = files.filter(function (f) {
            const isMp3Name = typeof f.name === "string" && /\.mp3$/i.test(f.name);
            const isMp3Format = typeof f.format === "string" && f.format.indexOf("MP3") !== -1;
            return isMp3Name || (isMp3Format && f.name);
          });
          if (!mp3s.length) throw new Error("No MP3s in item");
 
          const file = pickRandom(mp3s);
          const itemTitle = (res.meta.metadata && res.meta.metadata.title) || res.identifier;
          const url = "https://archive.org/download/" + res.identifier + "/" + encodePath(file.name);
 
          const candidate = {
            title: cleanTitle(file.name),
            itemTitle: typeof itemTitle === "string" ? itemTitle : res.identifier,
            identifier: res.identifier,
            url: url
          };
 
          playUrl(url, mySession, candidate);
        })
        .catch(function (err) {
          if (err && err.stale) return;
          // Silently discard and retry with a different identifier
          setTimeout(function () { attempt(tries + 1); }, 300);
        });
    }
  }
 
  function playUrl(url, mySession, candidate) {
    audio.src = url;
    audio.load();
 
    const onCanPlay = function () {
      cleanup();
      if (mySession !== session) return;
      audio.play().then(function () {
        if (mySession !== session) return;
        // The outgoing show (if any) is now genuinely "recently played" —
        // record it only now that its successor has actually started.
        if (currentTrackInfo) pushHistory(currentTrackInfo);
        currentTrackInfo = candidate;
        isLoading = false;
        setPlayingUI();
        updateMediaSession();
      }).catch(function () {
        // Autoplay blocked or decode issue — try another track
        retry();
      });
    };
 
    const onError = function () {
      cleanup();
      retry();
    };
 
    function retry() {
      if (mySession !== session) return;
      setTimeout(tuneIn, 300);
    }
 
    function cleanup() {
      audio.removeEventListener("canplay", onCanPlay);
      audio.removeEventListener("error", onError);
    }
 
    audio.addEventListener("canplay", onCanPlay);
    audio.addEventListener("error", onError);
  }
 
  // When a broadcast ends, immediately tune the next one on the same station
  audio.addEventListener("ended", function () {
    if (isPoweredOn && activeStation) tuneIn();
  });
 
  // Mid-playback failures (network drop, bad file) — recover instead of going silent
  audio.addEventListener("stalled", noopGuard);
  function noopGuard() { /* stalled often self-recovers; rely on 'error' + 'ended' */ }
 
  // ---------- UI states ----------
  function setStandbyUI() {
    eyebrowEl.textContent = "STANDBY";
    titleEl.textContent = "Select a station to tune in.";
    subEl.textContent = "";
    timerEl.textContent = "--:--";
    displayEl.classList.remove("tuning");
  }
 
  function setTuningUI() {
    eyebrowEl.textContent = activeStation ? activeStation.name.toUpperCase() : "";
    titleEl.textContent = "Tuning in...";
    subEl.textContent = "";
    timerEl.textContent = "--:--";
    displayEl.classList.add("tuning");
  }
 
  function setPlayingUI() {
    displayEl.classList.remove("tuning");
    eyebrowEl.textContent = "NOW PLAYING \u00B7 " + activeStation.name.toUpperCase();
    titleEl.textContent = currentTrackInfo.title;
    subEl.textContent = currentTrackInfo.itemTitle !== currentTrackInfo.title ? currentTrackInfo.itemTitle : "";
  }
 
  function setPowerUI() {
    appEl.classList.toggle("on", isPoweredOn);
    appEl.classList.toggle("off", !isPoweredOn);
    powerBtn.setAttribute("aria-pressed", String(isPoweredOn));
    powerLabel.textContent = isPoweredOn ? "POWER ON" : "POWER OFF";
  }
 
  // ---------- Timer ----------
  function formatTime(s) {
    if (!isFinite(s) || s < 0) return "--:--";
    s = Math.floor(s);
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    const mm = String(m).padStart(2, "0");
    const ss = String(sec).padStart(2, "0");
    return h > 0 ? h + ":" + mm + ":" + ss : mm + ":" + ss;
  }
 
  audio.addEventListener("timeupdate", function () {
    if (!isPoweredOn || isLoading) return;
    const remaining = (audio.duration || 0) - (audio.currentTime || 0);
    timerEl.textContent = formatTime(remaining);
  });
 
  // ---------- Media Session ----------
  function updateMediaSession() {
    if (!("mediaSession" in navigator)) return;
    try {
      navigator.mediaSession.metadata = new MediaMetadata({
        title: currentTrackInfo ? currentTrackInfo.title : "Old Time Radio",
        artist: activeStation ? "WOTR \u00B7 " + activeStation.name : "WOTR",
        album: currentTrackInfo ? currentTrackInfo.itemTitle : ""
      });
      navigator.mediaSession.playbackState = "playing";
      navigator.mediaSession.setActionHandler("play", function () {
        resumeAudioCtx();
        audio.play().catch(function () {});
      });
      navigator.mediaSession.setActionHandler("pause", function () {
        audio.pause();
      });
      navigator.mediaSession.setActionHandler("stop", function () {
        powerOff();
      });
      // Deliberately no nexttrack/previoustrack — it's a radio, not a playlist.
      navigator.mediaSession.setActionHandler("nexttrack", null);
      navigator.mediaSession.setActionHandler("previoustrack", null);
    } catch (e) { /* unsupported handler names on some browsers */ }
  }
 
  // ---------- Power & station logic ----------
  function powerOn() {
    isPoweredOn = true;
    initWebAudio();
    resumeAudioCtx();
    // First power-on with nothing tuned: pick a station at random and play it,
    // like switching on a set that lands wherever the dial happens to be.
    if (!activeStation) {
      activeStation = pickRandom(STATIONS);
      markActiveStation();
    }
    setPowerUI();
    tuneIn(); // fresh fetch — never resumes the previous track
  }
 
  function powerOff() {
    isPoweredOn = false;
    session++; // invalidate in-flight fetches
    isLoading = false;
    audio.pause();
    audio.removeAttribute("src"); // stop background buffering
    audio.load();
    // The show that was playing is now recently-played — keep its link grabbable.
    if (currentTrackInfo) pushHistory(currentTrackInfo);
    currentTrackInfo = null;
    if ("mediaSession" in navigator) {
      try { navigator.mediaSession.playbackState = "none"; } catch (e) {}
    }
    setPowerUI();
    setStandbyUI();
    clearSleep(); // a manual or timer-driven shutoff cancels any pending sleep
    if (activeStation) {
      eyebrowEl.textContent = activeStation.name.toUpperCase() + " \u00B7 OFF AIR";
      titleEl.textContent = "Radio is off.";
    }
  }
 
  powerBtn.addEventListener("click", function () {
    if (isPoweredOn) powerOff(); else powerOn();
  });
 
  function selectStation(st) {
    const changed = !activeStation || activeStation.id !== st.id;
    activeStation = st;
    markActiveStation();
    setStationMenu(false); // collapse the mobile dropdown after a pick
    if (!isPoweredOn) {
      powerOn(); // selecting a station is the user's interaction — turn the set on
    } else if (changed) {
      tuneIn();
    }
    // Clicking the already-active station while on does nothing — no skip button in disguise.
  }
})();
</script>
</body>
</html>
